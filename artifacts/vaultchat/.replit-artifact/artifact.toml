kind = "web"
previewPath = "/"
title = "VaultChat"
version = "1.0.0"
id = "artifacts/vaultchat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21279

[services.development]
run = "pnpm --filter @workspace/vaultchat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vaultchat", "run", "build" ]
publicDir = "artifacts/vaultchat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21279"
BASE_PATH = "/"
